<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* FORM */
form{
    background:#1e293b;
    padding:28px;
    border-radius:12px;
    width:90%;
    max-width:450px;
    display:flex;
    flex-direction:column;
    gap:14px;
    box-shadow:0 0 25px rgba(56,189,248,0.2);
}

/* TITLE */
h2{
    text-align:center;
    color:#38bdf8;
    margin-bottom:10px;
}

/* INPUTS */
input,select,textarea{
    padding:12px;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:#fff;
    outline:none;
    transition:0.3s;
}

/* FOCUS EFFECT */
input:focus,select:focus,textarea:focus{
    border-color:#38bdf8;
    box-shadow:0 0 8px rgba(56,189,248,0.5);
}

/* BUTTON */
button{
    padding:12px;
    background:#38bdf8;
    color:#000;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
    transform:scale(1.03);
}
</style>

</head>

<body>

<form action="https://formsubmit.co/areebkhqn3@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://ImtiazAhmadKhan.github.io/test/thankyou.html">
<h2>Property Registration</h2>

<input type="text" name="Buyer Name" placeholder="Buyer Name" required>
<input type="text" name="Seller Name" placeholder="Seller Name" required>
<input type="text" name="Property Location" placeholder="Property Location" required>

<select name="Property Type" required>
<option value="">Select Property Type</option>
<option>Plot</option>
<option>House</option>
<option>Flat</option>
</select>

<input type="number" name="Property Value" placeholder="Property Value (₹)" required>
<input type="text" name="Aadhaar" placeholder="Aadhaar Number" required>
<input type="text" name="PAN" placeholder="PAN Number" required>

<textarea name="Details" placeholder="Full Property Details" rows="4" required></textarea>

<button type="submit">Submit Registry</button>

</form>

</body>
</html>
