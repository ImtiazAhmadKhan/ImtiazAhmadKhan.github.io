<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Confirmed | Imtiaz Ahmad Khan Advocate</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --dark: #070707;
  --dark2: #101010;
  --dark3: #181818;
  --cream: #f0e8d8;
  --muted: #7a6e5a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Lato',sans-serif;
  background:
    linear-gradient(rgba(7,7,7,0.94), rgba(7,7,7,0.94)),
    url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=1600&q=80') center/cover fixed;
  color:var(--cream);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  background:var(--dark2);
  border:1px solid rgba(201,168,76,0.2);
  padding:4rem 3rem;
  text-align:center;
  max-width:520px;
  width:90%;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.box::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
}

.icon{
  width:70px;
  height:70px;
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 1.5rem;
  font-size:28px;
  color:var(--gold);
}

h1{
  font-family:'Playfair Display',serif;
  font-size:2.2rem;
  margin-bottom:0.7rem;
}

p{
  color:var(--muted);
  font-size:1rem;
  line-height:1.8;
  margin-bottom:2.2rem;
}

.btn{
  display:inline-block;
  background:var(--gold);
  color:#000;
  padding:0.9rem 2.5rem;
  font-family:'Cinzel',serif;
  font-size:0.7rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  text-decoration:none;
  font-weight:700;
  transition:all 0.3s;
}

.btn:hover{
  background:var(--gold-light);
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="box">
  <div class="icon">✓</div>

  <h1>Appointment Booked</h1>

  <p>
    Thank you for contacting Advocate Imtiaz Ahmad Khan.<br><br>
    Your appointment request has been successfully received.<br>
    Our team will contact you shortly to confirm your schedule.
  </p>

  <a href="index.html" class="btn">Back to Home</a>
</div>

</body>
</html>
